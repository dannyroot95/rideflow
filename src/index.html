<!DOCTYPE html>
<html class="light">
<head>
  <meta charset='utf-8'>
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <title>RideFlow</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>


  <script>
   if(localStorage.getItem("userData") == null){
    window.location.href = `http://${window.location.host}`;
   }
  </script>
  <script src="/vendor/jquery/jquery-3.2.1.min.js"></script>

  <link rel='stylesheet' type='text/css' media='screen' href='/src/css/style.css'>
  
</head>
<body>

  <div class="app-container" style="width: 100%;">
    <div class="sidebar">

        </div>
      </div>

      <ul class="sidebar-list" id="sidebarList">
        <li class="sidebar-list-item active">
          <a href="#inicio">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-home">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>

        <li class="sidebar-list-item">

          <a href="#asociaciones" data-link="asociaciones">

              <path d="M21.21 15.89A10 10 0 1 1 8 2.83" />
              <path d="M22 12A10 10 0 0 0 12 2v10z" />
            </svg>
            <span>Asociaciones</span>
          </a>
        </li>
        <li class="sidebar-list-item">
          <a href="#" data-link="reportes">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-inbox">
              <polyline points="22 12 16 12 14 15 10 15 8 12 2 12" />

            </svg>
            <span>Reportes</span>
          </a>
        </li>
        <li class="sidebar-list-item">
          <a href="#" data-link="notificaciones">

              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />

            <span>Notificaciones</span>
          </a>
        </li>

      <div class="account-info">

        <button class="account-info-more" onclick="logout()">

      </div>
      <div class="app-content-actions" style="width: 100%;height: 100%;">
        


      </div>

    <script src='/src/js/main.js'></script>
